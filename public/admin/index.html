<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 대시보드 | G-DAX</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans KR',-apple-system,sans-serif; background:#f9fafb; color:#111827; }
  .header { background:linear-gradient(135deg,#1e3a5f,#2563eb); color:#fff; padding:20px 24px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 2px 8px rgba(0,0,0,.1); }
  .header h1 { font-size:22px; font-weight:700; }
  .header .user { font-size:14px; opacity:.9; }
  .logout-btn { padding:8px 20px; background:rgba(255,255,255,.2); border:none; border-radius:8px; color:#fff; font-weight:600; cursor:pointer; font-size:14px; }
  .logout-btn:hover { background:rgba(255,255,255,.3); }
  .container { max-width:1400px; margin:0 auto; padding:30px 24px; }
  .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:20px; margin-bottom:30px; }
  .stat-card { background:#fff; padding:24px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.05); border:1px solid #e5e7eb; }
  .stat-card .icon { font-size:32px; margin-bottom:10px; }
  .stat-card .value { font-size:32px; font-weight:900; color:#1e3a5f; margin-bottom:4px; }
  .stat-card .label { font-size:13px; color:#6b7280; }
  .card { background:#fff; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.05); padding:24px; margin-bottom:24px; border:1px solid #e5e7eb; }
  .card h2 { font-size:18px; font-weight:700; color:#1e3a5f; margin-bottom:20px; }
  .toolbar { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
  .search-input { padding:10px 14px; border:1.5px solid #e5e7eb; border-radius:8px; font-size:14px; width:300px; }
  .btn { padding:10px 20px; background:#2563eb; color:#fff; border:none; border-radius:8px; font-weight:600; cursor:pointer; font-size:14px; }
  .btn:hover { background:#1d4ed8; }
  .btn-success { background:#16a34a; }
  .btn-success:hover { background:#15803d; }
  table { width:100%; border-collapse:collapse; }
  table th { text-align:left; padding:12px; background:#f3f4f6; font-weight:600; font-size:13px; color:#374151; border-bottom:2px solid #e5e7eb; }
  table td { padding:12px; border-bottom:1px solid #f3f4f6; font-size:14px; }
  table tr:hover { background:#f9fafb; }
  .action-btn { padding:6px 12px; margin-right:6px; border:none; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; }
  .btn-view { background:#eff6ff; color:#2563eb; }
  .btn-view:hover { background:#dbeafe; }
  .btn-delete { background:#fee2e2; color:#dc2626; }
  .btn-delete:hover { background:#fecaca; }
  .type-badge { padding:4px 10px; border-radius:6px; font-size:12px; font-weight:600; }
  .loading { text-align:center; padding:40px; color:#6b7280; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🔒 G-DAX 관리자 대시보드</h1>
    <div class="user">관리자: <span id="username"></span></div>
  </div>
  <button class="logout-btn" onclick="logout()">로그아웃</button>
</div>

<div class="container">
  <div class="stats">
    <div class="stat-card">
      <div class="icon">📊</div>
      <div class="value" id="statTotal">-</div>
      <div class="label">전체 진단</div>
    </div>
    <div class="stat-card">
      <div class="icon">🏢</div>
      <div class="value" id="statCompanies">-</div>
      <div class="label">기업 수</div>
    </div>
    <div class="stat-card">
      <div class="icon">📅</div>
      <div class="value" id="statMonth">-</div>
      <div class="label">이번 달 진단</div>
    </div>
    <div class="stat-card">
      <div class="icon">🎯</div>
      <div class="value" id="statType">-</div>
      <div class="label">최다 유형</div>
    </div>
  </div>

  <div class="card">
    <h2>📋 진단 목록</h2>
    <div class="toolbar">
      <input type="text" id="searchInput" class="search-input" placeholder="🔍 기업명 검색..." onkeypress="if(event.key==='Enter')loadData()" />
      <button class="btn" onclick="loadData()">검색</button>
      <button class="btn btn-success" onclick="downloadExcel()" style="margin-left:auto">📥 전체 엑셀 다운로드</button>
    </div>
    <div id="tableArea" class="loading">데이터를 불러오는 중...</div>
  </div>
</div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script>
// 인증 확인
const token = localStorage.getItem('adminToken');
const username = localStorage.getItem('adminUsername');

if (!token) {
  window.location.href = '/admin/login.html';
} else {
  document.getElementById('username').textContent = username || 'admin';
  loadData();
}

function logout() {
  localStorage.removeItem('adminToken');
  localStorage.removeItem('adminUsername');
  window.location.href = '/admin/login.html';
}

async function loadData() {
  const search = document.getElementById('searchInput').value.trim();
  const tableArea = document.getElementById('tableArea');
  tableArea.innerHTML = '<div class="loading">데이터를 불러오는 중...</div>';
  
  try {
    // 진단 목록 조회
    let url = '/api/assessments?limit=100';
    if (search) url += `&search=${encodeURIComponent(search)}`;
    
    const res = await fetch(url, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    
    if (res.status === 401) {
      alert('인증이 만료되었습니다. 다시 로그인해 주세요.');
      logout();
      return;
    }
    
    const data = await res.json();
    renderTable(data.results || []);
    updateStats(data.results || []);
    
  } catch (error) {
    tableArea.innerHTML = '<div class="loading">❌ 데이터를 불러오지 못했습니다.</div>';
    console.error('Load data error:', error);
  }
}

function renderTable(results) {
  const tableArea = document.getElementById('tableArea');
  
  if (results.length === 0) {
    tableArea.innerHTML = '<div class="loading">진단 데이터가 없습니다.</div>';
    return;
  }
  
  const typeNames = { struct: '구조전환형', process: '공정혁신형', value: '가치창출형', strong: '강소기반형' };
  const intensityNames = { high: '대규모', medium: '중규모', low: '소규모' };
  
  tableArea.innerHTML = `
    <table>
      <thead>
        <tr>
          <th style="width:50px">#</th>
          <th>기업명</th>
          <th style="width:80px">업종유형</th>
          <th style="width:100px">진단일</th>
          <th>전환유형</th>
          <th style="width:80px">전환강도</th>
          <th style="width:80px">총점</th>
          <th style="width:150px">액션</th>
        </tr>
      </thead>
      <tbody>
        ${results.map((r, i) => `
        <tr>
          <td>${i + 1}</td>
          <td><strong>${r.company_name}</strong></td>
          <td>${r.ind_type || '-'}</td>
          <td>${new Date(r.created_at).toLocaleDateString('ko-KR')}</td>
          <td><span class="type-badge" style="background:#eff6ff;color:#2563eb">${typeNames[r.transition_type] || r.transition_type}</span></td>
          <td>${intensityNames[r.transition_intensity] || r.transition_intensity}</td>
          <td><strong>${r.total_score}</strong></td>
          <td>
            <button class="action-btn btn-view" onclick="viewReport(${r.id})">📊</button>
            <button class="action-btn btn-delete" onclick="deleteAssessment(${r.id}, '${r.company_name}')">🗑️</button>
          </td>
        </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function updateStats(results) {
  document.getElementById('statTotal').textContent = results.length;
  
  // 중복 제거한 기업 수
  const uniqueCompanies = new Set(results.map(r => r.company_name));
  document.getElementById('statCompanies').textContent = uniqueCompanies.size;
  
  // 이번 달 진단 수
  const thisMonth = results.filter(r => {
    const date = new Date(r.created_at);
    const now = new Date();
    return date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear();
  });
  document.getElementById('statMonth').textContent = thisMonth.length;
  
  // 최다 유형
  const typeCounts = {};
  results.forEach(r => {
    typeCounts[r.transition_type] = (typeCounts[r.transition_type] || 0) + 1;
  });
  const maxType = Object.keys(typeCounts).reduce((a, b) => 
    typeCounts[a] > typeCounts[b] ? a : b, 'struct'
  );
  const typeNames = { struct: '구조전환', process: '공정혁신', value: '가치창출', strong: '강소기반' };
  document.getElementById('statType').textContent = typeNames[maxType] || '-';
}

function viewReport(id) {
  window.open(`/report.html?id=${id}`, '_blank');
}

async function deleteAssessment(id, companyName) {
  if (!confirm(`정말 삭제하시겠습니까?\n\n기업: ${companyName}\n진단 ID: ${id}\n\n삭제된 데이터는 복구할 수 없습니다.`)) {
    return;
  }
  
  try {
    const res = await fetch(`/api/assessments/delete/${id}`, {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + token }
    });
    
    const result = await res.json();
    
    if (result.success) {
      alert('삭제되었습니다.');
      loadData();
    } else {
      alert('삭제 실패: ' + result.error);
    }
  } catch (error) {
    alert('삭제 중 오류가 발생했습니다.');
    console.error('Delete error:', error);
  }
}

async function downloadExcel() {
  try {
    const res = await fetch('/api/export', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    
    if (!res.ok) {
      alert('데이터 조회에 실패했습니다.');
      return;
    }
    
    const data = await res.json();
    
    // Sheet1: 진단결과
    const ws1Data = data.map(r => ({
      '기업명': r.company_name,
      '업종유형': r.ind_type,
      '진단일': r.created_at,
      'G1': r.g1, 'G2': r.g2, 'G3': r.g3, 'G4': r.g4, 'G5': r.g5,
      'D1': r.d1, 'D2': r.d2, 'D3': r.d3, 'D4': r.d4, 'D5': r.d5,
      'A1': r.a1, 'A2': r.a2, 'A3': r.a3, 'A4': r.a4, 'A5': r.a5,
      'X1': r.x1, 'X2': r.x2, 'X3': r.x3, 'X4': r.x4, 'X5': r.x5,
      'G평균': r.g_avg, 'DA가중평균': r.tech_avg, 'X평균': r.x_avg,
      '전환유형': r.transition_type, '전환강도': r.transition_intensity,
      '총점': r.total_score
    }));
    
    // Sheet2: 기업정보
    const ws2Data = data.map(r => ({
      '기업명': r.company_name, '대표자': r.ceo, '소재지': r.location,
      '업종': r.industry, '종업원수': r.employees, '매출액': r.revenue,
      '설립연도': r.founded, '담당자': r.contact_name,
      '이메일': r.contact_email, '전화번호': r.contact_phone
    }));
    
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(ws1Data), '진단결과');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(ws2Data), '기업정보');
    
    const today = new Date().toISOString().slice(0, 10);
    XLSX.writeFile(wb, `GDAX_진단현황_${today}.xlsx`);
    
  } catch (error) {
    alert('엑셀 다운로드 중 오류가 발생했습니다.');
    console.error('Excel error:', error);
  }
}
</script>

</body>
</html>
