<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G-DAX 준비도 진단 결과 리포트</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap');

  :root {
    --green: #16a34a; --green-light: #dcfce7; --green-bg: #f0fdf4;
    --digital: #2563eb; --digital-light: #dbeafe; --digital-bg: #eff6ff;
    --ai: #7c3aed; --ai-light: #ede9fe; --ai-bg: #f5f3ff;
    --trans: #dc2626; --trans-light: #fee2e2; --trans-bg: #fef2f2;
    --navy: #1e3a5f; --gray-50: #f9fafb; --gray-100: #f3f4f6;
    --gray-200: #e5e7eb; --gray-300: #d1d5db; --gray-500: #6b7280;
    --gray-700: #374151; --gray-900: #111827;
    --btjr-B: #2563eb; --btjr-T: #16a34a; --btjr-J: #b45309; --btjr-R: #dc2626;
    --shadow: 0 4px 24px rgba(0,0,0,0.06);
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--gray-50); color: var(--gray-900); line-height: 1.6;
  }

  /* ── Cover (compact) ── */
  .cover {
    background: linear-gradient(135deg, var(--navy) 0%, #1e40af 40%, #7c3aed 70%, #dc2626 100%);
    color: #fff; padding: 14px 24px 12px; text-align: center; position: relative; overflow: hidden;
  }
  .cover::before {
    content: ''; position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M20 20.5V18H0v-2h20v-2l3 3.5-3 3z'/%3E%3C/g%3E%3C/svg%3E");
  }
  .cover-inner { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; display: flex; align-items: center; justify-content: center; gap: 16px; flex-wrap: wrap; }
  .cover h1 { font-size: 18px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 0; }
  .cover .company-name { font-size: 18px; font-weight: 700; opacity: 0.95; margin-bottom: 0; }
  .cover .cover-sep { opacity: 0.5; font-size: 16px; }
  .cover-date { font-size: 12px; opacity: 0.7; }
  .cover-gdax { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
  .cover-gdax .gd-chip { padding: 3px 10px; border-radius: 8px; font-size: 12px; font-weight: 700; background: rgba(255,255,255,0.12); backdrop-filter: blur(4px); }
  .cover-type { display: inline-block; padding: 3px 14px; border-radius: 6px; font-size: 12px; font-weight: 700; background: rgba(255,255,255,0.2); backdrop-filter: blur(4px); }
  .cover-row2 { display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; width: 100%; margin-top: 6px; }

  /* ── Container ── */
  .page { max-width: 960px; margin: 0 auto; padding: 30px 24px; }

  /* ── Cards ── */
  .card {
    background: #fff; border-radius: var(--radius); box-shadow: var(--shadow);
    margin-bottom: 24px; overflow: hidden; border: 1px solid var(--gray-200);
  }
  .card-header {
    padding: 16px 24px; display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--gray-100);
  }
  .card-header .ch-icon { font-size: 20px; }
  .card-header h2 { font-size: 17px; font-weight: 700; }
  .card-header .ch-tag { margin-left: auto; font-size: 11px; color: var(--gray-500); }
  .card-body { padding: 24px; }

  /* ── Framework Callout ── */
  .fw-callout {
    padding: 12px 16px; border-radius: 10px; margin-bottom: 20px;
    font-size: 12px; line-height: 1.7; display: flex; gap: 10px; align-items: flex-start;
  }
  .fw-callout .fw-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .fw-callout-navy { background: #f0f4f8; border: 1px solid #cbd5e1; color: #334155; }
  .fw-callout-green { background: var(--green-bg); border: 1px solid #bbf7d0; color: #166534; }
  .fw-callout-blue { background: var(--digital-bg); border: 1px solid #bfdbfe; color: #1e40af; }
  .fw-callout-purple { background: var(--ai-bg); border: 1px solid #c4b5fd; color: #5b21b6; }
  .fw-callout-red { background: var(--trans-bg); border: 1px solid #fca5a5; color: #991b1b; }

  /* ── Overall Score Hero ── */
  .score-hero {
    display: grid; grid-template-columns: 200px 1fr; gap: 30px; align-items: center;
  }
  @media(max-width:700px) { .score-hero { grid-template-columns: 1fr; } }
  .score-circle-wrap { text-align: center; }
  .score-circle {
    width: 160px; height: 160px; border-radius: 50%; margin: 0 auto 10px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .score-circle .big-num { font-size: 48px; font-weight: 900; }
  .score-circle .max-label { font-size: 13px; opacity: 0.9; font-weight: 500; }
  .score-level { font-size: 15px; font-weight: 700; text-align: center; }

  .score-bars { display: flex; flex-direction: column; gap: 14px; }
  .sbar-item { display: flex; align-items: center; gap: 12px; }
  .sbar-label { width: 130px; font-size: 11.5px; font-weight: 600; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
  .sbar-label .sbar-icon { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .sbar-track { flex: 1; height: 28px; background: var(--gray-100); border-radius: 8px; overflow: hidden; position: relative; }
  .sbar-fill { height: 100%; border-radius: 8px; display: flex; align-items: center; justify-content: flex-end; padding-right: 10px; font-size: 13px; font-weight: 700; color: #fff; transition: width 1.2s ease; min-width: 40px; }
  .sbar-score { width: 50px; text-align: right; font-size: 14px; font-weight: 700; }

  /* ── Radar Chart ── */
  .radar-wrap { display: flex; justify-content: center; padding: 10px 0; }
  .radar-wrap canvas { max-width: 520px; width: 100%; }
  .gap-unified { display: flex; flex-direction: column; gap: 12px; }
  .gap-radar-side { width: 100%; }
  .gap-radar-side .radar-wrap { padding: 0; }
  .gap-radar-side .radar-wrap canvas { max-width: 520px; }
  .gap-matrix-side { width: 100%; }
  .gap-matrix-side .matrix { font-size: 12px; }
  .gap-matrix-side .matrix th { padding: 8px 10px; font-size: 11px; }
  .gap-matrix-side .matrix td { padding: 7px 10px; font-size: 12px; }

  /* ── Domain Detail Card ── */
  .domain-detail { margin-bottom: 20px; padding: 20px; border-radius: 12px; border: 1px solid var(--gray-200); }
  .domain-detail:last-child { margin-bottom: 0; }
  .dd-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .dd-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .dd-title { font-size: 16px; font-weight: 700; }
  .dd-score { margin-left: auto; font-size: 24px; font-weight: 900; }
  .dd-level { font-size: 11px; padding: 3px 10px; border-radius: 6px; font-weight: 600; margin-left: 8px; }

  .dd-group-label { font-size: 11px; font-weight: 700; color: #fff; padding: 3px 10px; border-radius: 4px; margin: 10px 0 6px; display: inline-flex; align-items: center; gap: 8px; }
  .dd-group-label:first-child { margin-top: 0; }
  .dd-group-label.dg-pressure { background: #ef4444; }
  .dd-group-label.dg-infra { background: #2563eb; }
  .dd-group-label.dg-drive { background: #16a34a; }
  .dd-group-label.dg-growth { background: #b45309; }
  .dd-group-label.dg-talent { background: #7c3aed; }
  .dd-group-avg { font-size: 10px; font-weight: 600; background: rgba(255,255,255,0.3); padding: 1px 6px; border-radius: 3px; }

  /* ── Group Sub-score Matrix ── */
  .gsm-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .gsm-table th, .gsm-table td { padding: 8px 10px; text-align: center; border: 1px solid var(--gray-200); }
  .gsm-table thead th { background: var(--gray-50); font-weight: 700; font-size: 11px; color: var(--gray-700); }
  .gsm-table tbody th { font-weight: 600; text-align: left; padding-left: 12px; white-space: nowrap; }
  .gsm-table .gsm-row-label { display: inline-flex; align-items: center; gap: 6px; }
  .gsm-table .gsm-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .gsm-table td { font-weight: 700; font-size: 13px; }
  .gsm-table td.gsm-high { color: #dc2626; background: #fef2f2; }
  .gsm-table td.gsm-mid  { color: #b45309; background: #fffbeb; }
  .gsm-table td.gsm-low  { color: #16a34a; background: #f0fdf4; }
  .gsm-table td.gsm-na   { color: var(--gray-300); font-size: 11px; font-weight: 400; }
  .gsm-insight { margin-top: 12px; padding: 10px 14px; border-radius: 8px; background: #fffbeb; border: 1px solid #fde68a; font-size: 11px; line-height: 1.6; color: #92400e; }
  .gsm-insight strong { font-weight: 700; }

  .dd-questions { margin-top: 12px; }
  .dd-q { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--gray-50); font-size: 13px; }
  .dd-q:last-child { border-bottom: none; }
  .dd-q .q-code { font-size: 11px; font-weight: 700; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
  .dd-q .q-text { flex: 1; color: var(--gray-700); }
  .dd-q .q-dots { display: flex; gap: 4px; }
  .dd-q .q-dot { width: 20px; height: 20px; border-radius: 50%; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
  .dd-q .q-dot.filled { color: #fff; }
  .dd-q .q-dot.empty { background: var(--gray-100); color: var(--gray-300); }
  .dd-q .btjr-tags { display: flex; gap: 3px; flex-shrink: 0; }
  .dd-q .btag { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 700; }
  .btag-B { background: #dbeafe; color: #1e40af; }
  .btag-T { background: #dcfce7; color: #166534; }
  .btag-J { background: #fef3c7; color: #92400e; }
  .btag-R { background: #fee2e2; color: #991b1b; }

  .dd-G { border-left: 4px solid var(--green); }
  .dd-G .dd-icon { background: var(--green-light); color: var(--green); }
  .dd-G .dd-score { color: var(--green); }
  .dd-G .dd-level { background: var(--green-light); color: var(--green); }
  .dd-G .q-dot.filled { background: var(--green); }
  .dd-G .q-code { background: var(--green-light); color: var(--green); }

  .dd-D { border-left: 4px solid var(--digital); }
  .dd-D .dd-icon { background: var(--digital-light); color: var(--digital); }
  .dd-D .dd-score { color: var(--digital); }
  .dd-D .dd-level { background: var(--digital-light); color: var(--digital); }
  .dd-D .q-dot.filled { background: var(--digital); }
  .dd-D .q-code { background: var(--digital-light); color: var(--digital); }

  .dd-A { border-left: 4px solid var(--ai); }
  .dd-A .dd-icon { background: var(--ai-light); color: var(--ai); }
  .dd-A .dd-score { color: var(--ai); }
  .dd-A .dd-level { background: var(--ai-light); color: var(--ai); }
  .dd-A .q-dot.filled { background: var(--ai); }
  .dd-A .q-code { background: var(--ai-light); color: var(--ai); }

  .dd-X { border-left: 4px solid var(--trans); }
  .dd-X .dd-icon { background: var(--trans-light); color: var(--trans); }
  .dd-X .dd-score { color: var(--trans); }
  .dd-X .dd-level { background: var(--trans-light); color: var(--trans); }
  .dd-X .q-dot.filled { background: var(--trans); }
  .dd-X .q-code { background: var(--trans-light); color: var(--trans); }

  /* ── 4분면 Matrix Chart ── */
  .quadrant-wrap { display: flex; justify-content: center; padding: 10px 0; }
  .quadrant-wrap canvas { max-width: 480px; width: 100%; }

  /* ── Type Classification Cards ── */
  .type-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  @media(max-width:600px) { .type-grid { grid-template-columns: 1fr; } }
  .type-card { padding: 18px; border-radius: 12px; text-align: center; border: 2px solid var(--gray-200); opacity: 0.45; transition: all 0.3s; }
  .type-card.active { opacity: 1; border-width: 3px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); transform: scale(1.02); }
  .type-card .tc-icon { font-size: 32px; margin-bottom: 8px; }
  .type-card .tc-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .type-card .tc-desc { font-size: 12px; color: var(--gray-500); line-height: 1.5; }
  .type-card .tc-condition { font-size: 11px; margin-top: 6px; padding: 3px 10px; border-radius: 6px; display: inline-block; }

  .tc-struct.active { border-color: #dc2626; background: #fef2f2; }
  .tc-struct.active .tc-condition { background: #fee2e2; color: #991b1b; }
  .tc-process.active { border-color: #7c3aed; background: #f5f3ff; }
  .tc-process.active .tc-condition { background: #ede9fe; color: #5b21b6; }
  .tc-value.active { border-color: #16a34a; background: #f0fdf4; }
  .tc-value.active .tc-condition { background: #dcfce7; color: #166534; }
  .tc-strong.active { border-color: #2563eb; background: #eff6ff; }
  .tc-strong.active .tc-condition { background: #dbeafe; color: #1e40af; }

  /* ── BTJR Impact ── */
  .btjr-flow { display: flex; align-items: center; justify-content: center; gap: 0; flex-wrap: wrap; margin: 14px 0; }
  .btjr-box { padding: 10px 14px; border-radius: 10px; text-align: center; min-width: 110px; color: #fff; position: relative; }
  .btjr-box .b-initial { font-size: 22px; font-weight: 900; }
  .btjr-box .b-kr { font-size: 11px; font-weight: 600; margin-top: 1px; }
  .btjr-box .b-score { font-size: 10px; opacity: 0.9; margin-top: 2px; }
  .btjr-box .b-level { font-size: 9px; opacity: 0.8; margin-top: 1px; }
  .btjr-arrow { font-size: 20px; color: var(--gray-300); padding: 0 6px; }
  .btjr-split { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
  @media(max-width:600px) { .btjr-split { grid-template-columns: 1fr; } }
  .btjr-split-card { border-radius: 10px; padding: 14px; border: 1px solid var(--gray-200); }
  .btjr-split-card h4 { font-size: 12px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .btjr-split-card h4 .bsc-dot { width: 8px; height: 8px; border-radius: 50%; }
  .btjr-mini-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 11px; }
  .btjr-mini-bar .bmb-label { width: 60px; font-weight: 600; }
  .btjr-mini-bar .bmb-track { flex: 1; height: 16px; background: var(--gray-100); border-radius: 4px; overflow: hidden; }
  .btjr-mini-bar .bmb-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; font-size: 10px; font-weight: 700; color: #fff; min-width: 28px; }
  .btjr-split-insight { margin-top: 8px; font-size: 10px; color: var(--gray-500); line-height: 1.5; }
  .btjr-detail { margin-top: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .btjr-detail-card { border: 1px solid var(--gray-200); border-radius: 8px; overflow: hidden; }
  .btjr-detail-header { display: flex; align-items: center; gap: 8px; padding: 5px 10px; font-weight: 700; font-size: 11px; color: #fff; }
  .btjr-detail-header .bdh-score { margin-left: auto; font-size: 11px; }
  .btjr-detail-body { display: flex; gap: 6px; padding: 4px 6px; }
  .btjr-detail-body > div { flex: 1; min-width: 0; }
  .btjr-side-label { font-size: 9px; font-weight: 700; margin-bottom: 2px; display: flex; align-items: center; gap: 4px; }
  .btjr-side-label span.sl-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .btjr-side-label span.sl-avg { margin-left: auto; font-size: 10px; }
  .btjr-detail-table { width: 100%; border-collapse: collapse; font-size: 9px; }
  .btjr-detail-table th { background: var(--gray-50); padding: 2px 4px; text-align: left; font-weight: 600; color: var(--gray-500); font-size: 8px; }
  .btjr-detail-table td { padding: 2px 4px; border-bottom: 1px solid var(--gray-50); font-size: 9px; }
  .btjr-detail-table tr:last-child td { border-bottom: none; }
  .btjr-detail-table .td-code { font-weight: 700; }
  .btjr-detail-table .td-group { font-size: 7px; border-radius: 3px; padding: 0px 3px; display: inline-block; white-space: nowrap; }
  .btjr-detail-table .td-score { text-align: center; font-weight: 600; }
  .btjr-detail-table .td-wscore { text-align: center; font-weight: 700; }
  .td-grp-pressure { background: #fef2f2; color: #dc2626; }
  .td-grp-growth { background: #fffbeb; color: #b45309; }
  .td-grp-drive { background: #f0fdf4; color: #16a34a; }
  .td-grp-infra { background: #eff6ff; color: #2563eb; }
  .td-grp-talent { background: #f5f3ff; color: #7c3aed; }
  .btjr-gap-bar { display: flex; align-items: center; gap: 4px; padding: 3px 10px; background: var(--gray-50); font-size: 9px; font-weight: 600; }
  .btjr-gap-track { flex: 1; height: 10px; background: #e5e7eb; border-radius: 5px; position: relative; overflow: hidden; }
  .btjr-gap-fill-p { position: absolute; left: 0; top: 0; height: 100%; border-radius: 5px 0 0 5px; }
  .btjr-gap-fill-r { position: absolute; right: 0; top: 0; height: 100%; border-radius: 0 5px 5px 0; }
  .btjr-gap-label { font-size: 9px; font-weight: 700; min-width: 60px; text-align: right; }
  .btjr-detail-footer { display: flex; justify-content: space-between; padding: 3px 10px; font-size: 9px; font-weight: 600; border-top: 1px solid var(--gray-100); }
  .btjr-B { background: linear-gradient(135deg, #2563eb, #3b82f6); }
  .btjr-T { background: linear-gradient(135deg, #16a34a, #22c55e); }
  .btjr-J { background: linear-gradient(135deg, #b45309, #d97706); }
  .btjr-R { background: linear-gradient(135deg, #dc2626, #ef4444); }

  /* ── Pressure × Readiness Matrix ── */
  .matrix-wrap { overflow-x: auto; }
  .matrix { width: 100%; border-collapse: collapse; font-size: 13px; }
  .matrix th { padding: 10px 14px; background: var(--navy); color: #fff; font-weight: 600; text-align: center; }
  .matrix td { padding: 10px 14px; border: 1px solid var(--gray-200); text-align: center; }
  .matrix .cell-high { background: #fef2f2; color: #991b1b; font-weight: 700; }
  .matrix .cell-med { background: #fffbeb; color: #92400e; font-weight: 600; }
  .matrix .cell-low { background: #f0fdf4; color: #166534; font-weight: 500; }

  /* ── Cross-SWOT ── */
  .swot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border: 2px solid var(--gray-300); border-radius: 12px; overflow: hidden; }
  .swot-cell { padding: 16px; }
  .swot-cell h4 { font-size: 13px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .swot-cell ul { list-style: none; padding: 0; margin: 0; }
  .swot-cell li { font-size: 12px; line-height: 1.7; padding: 3px 0; color: var(--gray-700); }
  .swot-cell li::before { content: '▸ '; font-weight: 700; }
  .swot-s { background: #eff6ff; border-right: 1px solid var(--gray-300); border-bottom: 1px solid var(--gray-300); }
  .swot-w { background: #fef2f2; border-bottom: 1px solid var(--gray-300); }
  .swot-o { background: #f0fdf4; border-right: 1px solid var(--gray-300); }
  .swot-t { background: #fffbeb; }
  .swot-s h4 { color: #1e40af; } .swot-w h4 { color: #991b1b; }
  .swot-o h4 { color: #166534; } .swot-t h4 { color: #92400e; }

  /* ── Task Pool Recommendations ── */
  .task-pool { margin-top: 16px; }
  .tp-direction { margin-bottom: 16px; padding: 16px; border-radius: 12px; border: 1px solid var(--gray-200); }
  .tp-direction .tp-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .tp-direction .tp-num { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .tp-direction .tp-title { font-size: 14px; font-weight: 700; }
  .tp-tasks { display: flex; flex-direction: column; gap: 6px; margin-left: 38px; }
  .tp-task { font-size: 12px; line-height: 1.6; color: var(--gray-700); padding: 4px 0; }
  .tp-task .tp-gdax { font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 4px; background: var(--gray-100); color: var(--gray-500); margin-left: 6px; }
  .tp-task-header { display: inline; }
  .tp-desc { font-size: 11px; line-height: 1.5; color: var(--gray-500); margin: 2px 0 8px 14px; padding-left: 8px; border-left: 2px solid var(--gray-200); }

/* ── Parse URL Data or Use Demo ── */
async function getData() {
  const params = new URLSearchParams(window.location.search);
  
  // 1. DB 조회 모드: ?id=123
  const id = params.get('id');
  if (id) {
    try {
      const res = await fetch('/api/assessments/' + id);
      if (!res.ok) throw new Error('Not found');
      const json = await res.json();
      return {
        data: {
          company: json.company,
          scores: json.scores,
          needs: json.needs,
          contact: json.contact
        },
        isDemo: false,
        meta: json.meta
      };
    } catch(e) {
      console.error('DB fetch failed:', e);
      // fall through to next mode
    }
  }
  
  // 2. Base64 모드: ?data=...
  const raw = params.get('data');
  if (raw) {
    try {
      return { data: JSON.parse(decodeURIComponent(escape(atob(raw)))), isDemo: false };
    } catch(e) { /* fall through */ }
  }
  
  // 3. Demo data - 5문항 × 4영역 = 20문항
  return {

/* ── Score Helpers ── */
function domainAvg(scores) { return scores.reduce((a,b) => a+b, 0) / scores.length; }

/* ── 통합 3단 구조 점수 계산 (레이더·전환유형·4분면 공용) ── */
function calcTierScores(scores) {
  const domains = ['G','D','A','X'];
  const TIER3_LABEL = { G: '성장 동력', D: '인재 역량', A: '인재 역량', X: '추진 동력' };
  const result = {};
  domains.forEach(dk => {
    const qs = DOMAIN_CONFIG[dk].questions;
    const tiers = {};
    qs.forEach((q, qi) => {
      const g = q.group;
      if (!tiers[g]) tiers[g] = { s: 0, c: 0 };
      tiers[g].s += scores[dk][qi];
      tiers[g].c++;
    });
    const t3Name = TIER3_LABEL[dk];
    const pressure = tiers['전환 압력'] ? tiers['전환 압력'].s / tiers['전환 압력'].c : 0;
    const foundation = tiers['실행 기반'] ? tiers['실행 기반'].s / tiers['실행 기반'].c : 0;
    const capability = tiers[t3Name] ? tiers[t3Name].s / tiers[t3Name].c : 0;
    // 실행 기반 + 동력/역량 통합 평균
    const fItems = tiers['실행 기반'] ? tiers['실행 기반'].c : 0;
    const cItems = tiers[t3Name] ? tiers[t3Name].c : 0;
    const fSum = tiers['실행 기반'] ? tiers['실행 기반'].s : 0;
    const cSum = tiers[t3Name] ? tiers[t3Name].s : 0;
    const readiness = (fItems + cItems) > 0 ? (fSum + cSum) / (fItems + cItems) : 0;
    result[dk] = {
      pressure,
      foundation,
      capability,
      readiness,  // 실행기반+동력/역량 통합
      capLabel: dk === 'G' ? '동력' : (dk === 'X' ? '동력' : '역량'),
      gap: Math.max(pressure - readiness, 0)
    };
  });
  return result;
}
function totalScore(allScores) {
  const all = [...allScores.G, ...allScores.D, ...allScores.A, ...allScores.X];
  return all.reduce((a,b) => a+b, 0);
}
function maxPossible() { return TOTAL_Q * 5; }
function getLevel(avg) {
  if (avg >= 4.0) return { text: '매우 높음', grade: 'A', color: '#dc2626' };
  if (avg >= 3.0) return { text: '높음', grade: 'B', color: '#b45309' };
  if (avg >= 2.0) return { text: '보통', grade: 'C', color: '#2563eb' };
  return { text: '낮음', grade: 'D', color: '#16a34a' };
}
function getPressure(avg) {
  if (avg >= 3.5) return '\u9AD8';
  if (avg >= 2.5) return '\u4E2D';
  return '\u4F4E';
}

/* ── 전환 유형 4분류 (G × D+A 모델) ── */
/* X축 = G 전환 압력 평균 (환경전환 압력 = G1,G2,G3)
   Y축 = techPressure (기술전환 압력 = D+A 전환 압력 문항만의 가중평균)
   업종별 가중치: 제조형(D55:A45), 서비스형(D50:A50), 기술형(D35:A65)
   X영역 = 고용전환 강도 조절자 (분류 후 Task Pool 강도 조절) */
function getTechPressure(scores, indType, tierData) {
  const ts = tierData || calcTierScores(scores);
  const dPressure = ts.D.pressure;
  const aPressure = ts.A.pressure;
  const w = DA_WEIGHTS[indType] || DA_WEIGHTS['제조형'];
  return dPressure * w.D + aPressure * w.A;
}

function getTypeClassification(scores, indType, tierData) {
  const ts = tierData || calcTierScores(scores);
  const gPressure = ts.G.pressure;
  const techPressure = getTechPressure(scores, indType, ts);
  const threshold = 3.0;

  const highGreen = gPressure >= threshold;
  const highTech = techPressure >= threshold;

  if (highGreen && highTech) return 'struct';   // 구조전환형
  if (!highGreen && highTech) return 'process';  // 공정혁신형
  if (highGreen && !highTech) return 'value';    // 가치창출형
  return 'strong';                                // 강소기반형
}

/* ── 고용전환 강도 판정 (X영역 전환 압력 + 추진 동력, 실행 기반 제외) ── */
function getTransitionIntensity(scores, tierData) {
  const ts = tierData || calcTierScores(scores);
  // X 전환 압력(X1,X2) + 추진 동력(X5)의 가중 평균
  // 실행 기반(X3,X4)은 내부준비도 문항으로 강도 산출에서 제외
  const pressure = ts.X.pressure;   // X1,X2 평균
  const momentum = ts.X.capability; // X5 (추진 동력)
  const intensityScore = (pressure * 2 + momentum) / 3;  // 압력 2:동력 1 가중
  if (intensityScore >= 3.5) return 'high';
  if (intensityScore >= 2.5) return 'medium';
  return 'low';
}

/* ── BTJR 가중 점수 계산 (1/n 균등 분배, 전환압력+성장동력+추진동력 문항만) ── */
function btjrScores(scores) {
  const sums = { B: 0, T: 0, J: 0, R: 0 };
  const cnts = { B: 0, T: 0, J: 0, R: 0 };
  const pressureGroups = ['\uC804\uD658 \uC555\uB825', '\uC131\uC7A5 \uB3D9\uB825', '\uCD94\uC9C4 \uB3D9\uB825'];

  Object.keys(DOMAIN_CONFIG).forEach(dk => {
    DOMAIN_CONFIG[dk].questions.forEach((q, i) => {
      if (!pressureGroups.includes(q.group)) return;  // 실행기반·인재역량 제외
      const val = scores[dk][i];
      const w = 1 / q.btjr.length;  // 1/n 균등 분배
      q.btjr.forEach(bk => {
        sums[bk] += val * w;
        cnts[bk] += w;
      });
    });
  });

  const result = {};
  Object.keys(sums).forEach(k => {
    result[k] = cnts[k] > 0 ? (sums[k] / cnts[k]).toFixed(1) : '0.0';
  });
  return result;
}

/* ── 그룹별 BTJR 분리 계산 (1/n 균등 분배, 성장·추진동력은 양측 포함) ── */
function btjrByGroup(scores) {
  const pressure = { B: { s: 0, c: 0 }, T: { s: 0, c: 0 }, J: { s: 0, c: 0 }, R: { s: 0, c: 0 } };
  const readiness = { B: { s: 0, c: 0 }, T: { s: 0, c: 0 }, J: { s: 0, c: 0 }, R: { s: 0, c: 0 } };
  const pressureGroups = ['\uC804\uD658 \uC555\uB825', '\uC131\uC7A5 \uB3D9\uB825', '\uCD94\uC9C4 \uB3D9\uB825'];
  const readyGroups = ['\uC2E4\uD589 \uAE30\uBC18', '\uC778\uC7AC \uC5ED\uB7C9', '\uC131\uC7A5 \uB3D9\uB825', '\uCD94\uC9C4 \uB3D9\uB825'];

  Object.keys(DOMAIN_CONFIG).forEach(dk => {
    DOMAIN_CONFIG[dk].questions.forEach((q, i) => {
      const val = scores[dk][i];
      const w = 1 / q.btjr.length;
      if (pressureGroups.includes(q.group)) {
        q.btjr.forEach(bk => { pressure[bk].s += val * w; pressure[bk].c += w; });
      }
      if (readyGroups.includes(q.group)) {
        q.btjr.forEach(bk => { readiness[bk].s += val * w; readiness[bk].c += w; });
      }
    });
  });

  const calc = obj => {
    const r = {};
    Object.keys(obj).forEach(k => { r[k] = obj[k].c > 0 ? (obj[k].s / obj[k].c).toFixed(1) : '0.0'; });
    return r;
  };
  return { pressure: calc(pressure), readiness: calc(readiness) };
}

/* ── 그룹 기반 내부준비도 계산 (실행 기반 + 인재 역량 + 성장 동력 + 추진 동력) ── */
function getReadiness(domain, scores) {
  const questions = DOMAIN_CONFIG[domain].questions;
  const readyGroups = ['실행 기반', '인재 역량', '성장 동력', '추진 동력'];
  let sum = 0, cnt = 0;
  questions.forEach((q, i) => {
    if (readyGroups.includes(q.group)) { sum += scores[domain][i]; cnt++; }
  });
  return cnt > 0 ? sum / cnt : 0;
}

/* ── Cross-SWOT 예비 분석 ── */
function generateSWOT(scores, domainAvgs) {
  const strengths = [], weaknesses = [], opportunities = [], threats = [];

  // S/W: 내부 역량 (실행기반·인재역량·성장동력·추진동력 그룹 기반)
  const readyGroups = ['실행 기반', '인재 역량', '성장 동력', '추진 동력'];
  Object.keys(DOMAIN_CONFIG).forEach(dk => {
    const cfg = DOMAIN_CONFIG[dk];
    cfg.questions.forEach((q, i) => {
      if (readyGroups.includes(q.group)) {
        if (scores[dk][i] >= 4) strengths.push(`${q.code} ${q.label}: ${cfg.name} 영역 내부 역량 우수`);
        else if (scores[dk][i] <= 2) weaknesses.push(`${q.code} ${q.label}: ${cfg.name} 영역 내부 역량 미흡`);
      }
    });
  });

  // 영역 평균 기반 S/W 보완
  if (domainAvgs.D >= 3.0 && getReadiness('D', scores) >= 3) strengths.push('디지털 시스템 기반 일정 수준 구축');
  if (domainAvgs.A <= 2.0) weaknesses.push('AI 전환 준비 전반 미흡');
  if (getReadiness('X', scores) >= 3.5) strengths.push('노사 소통 및 전환 교육 체계 양호');
  if (getReadiness('X', scores) <= 2.0) weaknesses.push('전환 교육·노사 소통 체계 미구축');

  // O/T: 산업전환환경 (전환압력 기반)
  Object.keys(DOMAIN_CONFIG).forEach(dk => {
    const cfg = DOMAIN_CONFIG[dk];
    const avg = domainAvgs[dk];
    const pressure = getPressure(avg);
    if (pressure === '\u9AD8') {
      threats.push(`${cfg.icon} ${cfg.name}: 전환압력 高 — 시급한 대응 필요`);
    }
    // 내부 준비도 양호 영역은 기회
    const readiness = getReadiness(dk, scores);
    if (readiness >= 3.5 && avg >= 3.0) {
      opportunities.push(`${cfg.icon} ${cfg.name}: 높은 압력이나 내부 준비도 양호 → 선제 대응 가능`);
    }
  });

  // 기본 O/T 보완
  if (domainAvgs.G >= 3.0) opportunities.push('정부 탄소중립·그린뉴딜 지원사업 활용 가능');
  if (domainAvgs.D >= 3.0) opportunities.push('정부 스마트제조·DX 지원사업 연계 가능');
  if (domainAvgs.X >= 3.5) threats.push('핵심인력 이탈·기술전수 단절 리스크');

  return {
    S: strengths.length > 0 ? strengths.slice(0, 3) : ['내부 역량 정밀 평가 필요'],
    W: weaknesses.length > 0 ? weaknesses.slice(0, 3) : ['정밀 진단을 통한 약점 식별 필요'],
    O: opportunities.length > 0 ? opportunities.slice(0, 3) : ['정부 산업전환 지원사업 활용 기회'],
    T: threats.length > 0 ? threats.slice(0, 3) : ['산업 전환 가속화에 따른 잠재적 위협 존재']
  };
}

/* ── Draw Radar Chart (이중 폴리곤: 전환 압력 vs 실행기반·역량 갭 시각화) ── */
function drawRadar(canvasId, scores) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width = 580;
  const H = canvas.height = 460;
  const cx = W/2, cy = H/2 - 10, R = 130;

  /* ── 반응형 폰트 스케일 ── */
  const displayW = canvas.getBoundingClientRect().width || W;
  const fScale = Math.max(0.7, Math.min(1, displayW / W));
  const fs = (px) => Math.round(px * fScale) + 'px';

  const domains = ['G','D','A','X'];
  const colors = domains.map(d => DOMAIN_CONFIG[d].color);
  const labels = domains.map(d => `${d} ${DOMAIN_CONFIG[d].name}`);
  const angles = domains.map((_, i) => (Math.PI * 2 * i / 4) - Math.PI/2);

  /* ── 통합 3단 구조 점수 (calcTierScores 공용) ── */
  const ts = calcTierScores(scores);
  const pressureAvgs = domains.map(d => ts[d].pressure);
  const readinessAvgs = domains.map(d => ts[d].readiness);

  ctx.clearRect(0, 0, W, H);

  // Grid rings
  for (let ring = 1; ring <= 5; ring++) {
    const r = R * ring / 5;
    ctx.beginPath();
    for (let i = 0; i <= 4; i++) {
      const a = angles[i % 4];
      const x = cx + r * Math.cos(a);
      const y = cy + r * Math.sin(a);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = ring === 5 ? '#d1d5db' : '#e5e7eb';
    ctx.lineWidth = ring === 5 ? 1.5 : 0.8;
    ctx.stroke();
    ctx.fillStyle = '#9ca3af'; ctx.font = fs(10) + ' Noto Sans KR';
    ctx.fillText(ring.toString(), cx + 4, cy - r + 12);
  }

  // Axes
  angles.forEach(a => {
    ctx.beginPath(); ctx.moveTo(cx, cy);
    ctx.lineTo(cx + R * Math.cos(a), cy + R * Math.sin(a));
    ctx.strokeStyle = '#e5e7eb'; ctx.lineWidth = 0.8; ctx.stroke();
  });

  /* ── GAP 영역 (전환 압력 > 실행기반·역량인 영역을 빗금 채움) ── */
  // 먼저 전환 압력 폴리곤과 실행기반·역량 폴리곤 사이의 갭 영역을 그림
  const pressurePts = pressureAvgs.map((v, i) => ({
    x: cx + (R * v / 5) * Math.cos(angles[i]),
    y: cy + (R * v / 5) * Math.sin(angles[i])
  }));
  const readinessPts = readinessAvgs.map((v, i) => ({
    x: cx + (R * v / 5) * Math.cos(angles[i]),
    y: cy + (R * v / 5) * Math.sin(angles[i])
  }));

  // 각 축 세그먼트별로 갭 영역 채움
  for (let i = 0; i < 4; i++) {
    const ni = (i + 1) % 4;
    const pCur = pressureAvgs[i], rCur = readinessAvgs[i];
    const pNext = pressureAvgs[ni], rNext = readinessAvgs[ni];
    // 해당 세그먼트에서 압력이 기반보다 높은 경우만 갭 표시
    if (pCur > rCur || pNext > rNext) {
      ctx.beginPath();
      ctx.moveTo(pressurePts[i].x, pressurePts[i].y);
      ctx.lineTo(pressurePts[ni].x, pressurePts[ni].y);
      ctx.lineTo(readinessPts[ni].x, readinessPts[ni].y);
      ctx.lineTo(readinessPts[i].x, readinessPts[i].y);
      ctx.closePath();
      ctx.fillStyle = 'rgba(220, 38, 38, 0.08)';
      ctx.fill();
    }
  }

  /* ── 실행기반·역량 폴리곤 (파란색) ── */
  ctx.beginPath();
  readinessAvgs.forEach((v, i) => {
    const r = R * v / 5;
    const x = cx + r * Math.cos(angles[i]);
    const y = cy + r * Math.sin(angles[i]);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.closePath();
  ctx.fillStyle = 'rgba(37, 99, 235, 0.10)'; ctx.fill();
  ctx.strokeStyle = '#2563eb'; ctx.lineWidth = 2; ctx.setLineDash([6, 3]); ctx.stroke();
  ctx.setLineDash([]);

  /* ── 전환 압력 폴리곤 (빨간색) ── */
  ctx.beginPath();
  pressureAvgs.forEach((v, i) => {
    const r = R * v / 5;
    const x = cx + r * Math.cos(angles[i]);
    const y = cy + r * Math.sin(angles[i]);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.closePath();
  ctx.fillStyle = 'rgba(220, 38, 38, 0.10)'; ctx.fill();
  ctx.strokeStyle = '#dc2626'; ctx.lineWidth = 2.5; ctx.stroke();

  /* ── 데이터 포인트 + 라벨 ── */
  domains.forEach((dk, i) => {
    const pVal = pressureAvgs[i];
    const rVal = readinessAvgs[i];
    const gapVal = ts[dk].gap;

    // 전환 압력 포인트 (빨간 다이아몬드)
    const pr = R * pVal / 5;
    const px = cx + pr * Math.cos(angles[i]);
    const py = cy + pr * Math.sin(angles[i]);
    const sz = 5;
    ctx.fillStyle = '#dc2626'; ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(px, py - sz); ctx.lineTo(px + sz, py);
    ctx.lineTo(px, py + sz); ctx.lineTo(px - sz, py);
    ctx.closePath(); ctx.fill(); ctx.stroke();

    // 실행기반·역량 포인트 (파란 원)
    const rr = R * rVal / 5;
    const rx = cx + rr * Math.cos(angles[i]);
    const ry = cy + rr * Math.sin(angles[i]);
    ctx.beginPath(); ctx.arc(rx, ry, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#2563eb'; ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();

    // 갭 연결선 (점선)
    if (gapVal > 0.3) {
      ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(rx, ry);
      ctx.strokeStyle = 'rgba(220, 38, 38, 0.4)'; ctx.lineWidth = 1.5;
      ctx.setLineDash([3, 3]); ctx.stroke(); ctx.setLineDash([]);
    }

    // 라벨 위치
    const lx = cx + (R + 44) * Math.cos(angles[i]);
    const ly = cy + (R + 44) * Math.sin(angles[i]);

    const cosA = Math.cos(angles[i]);
    let align = 'center';
    if (cosA > 0.3) align = 'left';
    else if (cosA < -0.3) align = 'right';

    // 도메인 라벨
    ctx.font = '700 ' + fs(13) + ' Noto Sans KR'; ctx.fillStyle = colors[i];
    ctx.textAlign = align; ctx.textBaseline = 'middle';
    ctx.fillText(labels[i], lx, ly - 14);

    // 압력 vs 기반·역량 수치
    ctx.font = '600 ' + fs(11) + ' Noto Sans KR';
    ctx.fillStyle = '#dc2626'; ctx.fillText('압력 ' + pVal.toFixed(1), lx, ly + 2);

    ctx.font = fs(11) + ' Noto Sans KR';
    const subY = ly + 16;
    ctx.fillStyle = '#2563eb';
    const readinessText = '기반·역량 ' + rVal.toFixed(1);
    ctx.fillText(readinessText, lx, subY);

    // 갭 표시 (갭이 유의미할 경우)
    if (gapVal > 0.3) {
      ctx.font = '700 ' + fs(10) + ' Noto Sans KR';
      ctx.fillStyle = '#991b1b';
      ctx.fillText('GAP ' + gapVal.toFixed(1), lx, subY + 14);
    }
  });

  /* ── 범례 (하단) ── */
  const legendY = H - 14;
  const legendItems = [
    { shape: 'diamond', color: '#dc2626', label: '전환 압력', dash: false },
    { shape: 'circle', color: '#2563eb', label: '실행기반·역량', dash: true },
    { shape: 'gap', color: 'rgba(220,38,38,0.15)', label: 'GAP 영역', dash: false }
  ];
  ctx.font = fs(10) + ' Noto Sans KR'; ctx.textBaseline = 'middle';
  const totalLegendW = legendItems.reduce((s, li) => s + ctx.measureText(li.label).width + 28, 0);
  let lxPos = cx - totalLegendW / 2;
  legendItems.forEach(li => {
    const sz = 4;
    ctx.fillStyle = li.color; ctx.strokeStyle = li.color; ctx.lineWidth = 1;
    if (li.shape === 'diamond') {
      ctx.beginPath(); ctx.moveTo(lxPos, legendY - sz); ctx.lineTo(lxPos + sz, legendY);
      ctx.lineTo(lxPos, legendY + sz); ctx.lineTo(lxPos - sz, legendY);
      ctx.closePath(); ctx.fill();
    } else if (li.shape === 'circle') {
      ctx.beginPath(); ctx.arc(lxPos, legendY, sz + 1, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.fillStyle = 'rgba(220,38,38,0.15)';
      ctx.fillRect(lxPos - sz, legendY - sz, sz * 2 + 2, sz * 2);
      ctx.strokeStyle = '#dc2626'; ctx.lineWidth = 0.8;
      ctx.strokeRect(lxPos - sz, legendY - sz, sz * 2 + 2, sz * 2);
    }
    ctx.fillStyle = '#6b7280'; ctx.textAlign = 'left';
    ctx.fillText(li.label, lxPos + 8, legendY);
    lxPos += ctx.measureText(li.label).width + 28;
  });
}

/* ── Draw 4분면 Matrix Chart (G × D+A 모델) ── */
function drawQuadrant(canvasId, scores, indType) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width = 480;
  const H = canvas.height = 480;
  const margin = { top: 50, right: 50, bottom: 60, left: 70 };
  const plotW = W - margin.left - margin.right;
  const plotH = H - margin.top - margin.bottom;

  ctx.clearRect(0, 0, W, H);

  const midX = margin.left + plotW * (3.0 - 1) / 4;
  const midY = margin.top + plotH * (1 - (3.0 - 1) / 4);

  // Quadrant backgrounds
  // 구조전환형 (top-right): high G + high D+A
  ctx.fillStyle = '#fef2f2'; ctx.fillRect(midX, margin.top, margin.left + plotW - midX, midY - margin.top);
  // 공정혁신형 (top-left): low G + high D+A
  ctx.fillStyle = '#f5f3ff'; ctx.fillRect(margin.left, margin.top, midX - margin.left, midY - margin.top);
  // 가치창출형 (bottom-right): high G + low D+A
  ctx.fillStyle = '#f0fdf4'; ctx.fillRect(midX, midY, margin.left + plotW - midX, margin.top + plotH - midY);
  // 강소기반형 (bottom-left): low G + low D+A
  ctx.fillStyle = '#eff6ff'; ctx.fillRect(margin.left, midY, midX - margin.left, margin.top + plotH - midY);

  // Grid
  ctx.strokeStyle = '#e5e7eb'; ctx.lineWidth = 0.5;
  for (let v = 1; v <= 5; v++) {
    const x = margin.left + plotW * (v - 1) / 4;
    const y = margin.top + plotH * (1 - (v - 1) / 4);
    ctx.beginPath(); ctx.moveTo(x, margin.top); ctx.lineTo(x, margin.top + plotH); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(margin.left, y); ctx.lineTo(margin.left + plotW, y); ctx.stroke();
    ctx.fillStyle = '#9ca3af'; ctx.font = '11px Noto Sans KR'; ctx.textAlign = 'center';
    ctx.fillText(v.toString(), x, margin.top + plotH + 16);
    ctx.textAlign = 'right';
    ctx.fillText(v.toString(), margin.left - 8, y + 4);
  }

  // Threshold lines
  ctx.strokeStyle = '#6b7280'; ctx.lineWidth = 1.5; ctx.setLineDash([5, 3]);
  ctx.beginPath(); ctx.moveTo(midX, margin.top); ctx.lineTo(midX, margin.top + plotH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(margin.left, midY); ctx.lineTo(margin.left + plotW, midY); ctx.stroke();
  ctx.setLineDash([]);

  // Quadrant labels
  ctx.font = '600 12px Noto Sans KR'; ctx.textAlign = 'center';
  const qLabels = [
    { text: '\u{1F3ED} \uAD6C\uC870\uC804\uD658\uD615', x: (midX + margin.left + plotW) / 2, y: (margin.top + midY) / 2, color: '#991b1b' },
    { text: '\u{2699}\u{FE0F} \uACF5\uC815\uD601\uC2E0\uD615', x: (margin.left + midX) / 2, y: (margin.top + midY) / 2, color: '#5b21b6' },
    { text: '\u{1F331} \uAC00\uCE58\uCC3D\uCD9C\uD615', x: (midX + margin.left + plotW) / 2, y: (midY + margin.top + plotH) / 2, color: '#166534' },
    { text: '\u{1F680} \uAC15\uC18C\uAE30\uBC18\uD615', x: (margin.left + midX) / 2, y: (midY + margin.top + plotH) / 2, color: '#1e40af' }
  ];
  qLabels.forEach(ql => { ctx.fillStyle = ql.color; ctx.fillText(ql.text, ql.x, ql.y); });

  // Plot company point (G압력 × D+A압력 — 전환 압력 문항만 사용)
  const ts = calcTierScores(scores);
  const gPressure = ts.G.pressure;
  const techPressure = getTechPressure(scores, indType, ts);
  const px = margin.left + plotW * (gPressure - 1) / 4;
  const py = margin.top + plotH * (1 - (techPressure - 1) / 4);

  // Shadow + Point
  ctx.beginPath(); ctx.arc(px, py, 14, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(30, 58, 95, 0.15)'; ctx.fill();
  ctx.beginPath(); ctx.arc(px, py, 10, 0, Math.PI * 2);
  ctx.fillStyle = '#1e3a5f'; ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();
  ctx.font = '700 11px Noto Sans KR'; ctx.fillStyle = '#1e3a5f'; ctx.textAlign = 'center';
  ctx.fillText('\uC6B0\uB9AC \uAE30\uC5C5', px, py - 20);

  // Axis labels
  ctx.font = '700 13px Noto Sans KR'; ctx.fillStyle = '#374151'; ctx.textAlign = 'center';
  ctx.fillText('X\uCD95: \uD658\uACBD\uC804\uD658 \uC555\uB825 (G \uC804\uD658\uC555\uB825 \uBB38\uD56D) \u2192', W / 2, H - 10);
  ctx.save(); ctx.translate(16, H / 2); ctx.rotate(-Math.PI / 2);
  ctx.fillText('Y\uCD95: \uAE30\uC220\uC804\uD658 \uC555\uB825 (D+A \uC804\uD658\uC555\uB825 \uBB38\uD56D) \u2192', 0, 0);
  ctx.restore();

  // Coordinates
  const w = DA_WEIGHTS[indType] || DA_WEIGHTS['제조형'];
  ctx.font = '600 11px Noto Sans KR'; ctx.fillStyle = '#6b7280'; ctx.textAlign = 'center';
  ctx.fillText(`G압력 ${gPressure.toFixed(1)} / D+A압력 ${techPressure.toFixed(1)} (D\u00D7${w.D}+A\u00D7${w.A})`, px, py + 26);
}

                  let rSum = 0, rCnt = 0;
                  readyGroups.forEach(g => { if (grpAvg[g]) { rSum += grpAvg[g].s; rCnt += grpAvg[g].c; } });
                  const rAvg = rCnt > 0 ? rSum / rCnt : 0;
                  const gap = pAvg - rAvg;
                  const gapVal = gap.toFixed(1);
                  let gapClass, gapText, priority;
                  if (rCnt > 0) {
                    if (pLevel === '\u9AD8' && rAvg <= 2.5) { gapClass = 'cell-high'; gapText = '\uAE34\uAE09'; priority = '\u2605\u2605\u2605'; }

                    else if (pLevel === '\u4E2D') { gapClass = 'cell-med'; gapText = '\uBAA8\uB2C8\uD130\uB9C1'; priority = '\u2605'; }
                    else { gapClass = 'cell-low'; gapText = '\uC591\uD638'; priority = '-'; }

                    <td style="font-weight:700;color:${cfg.color}">${cfg.icon} ${k} ${cfg.name}</td>
                    <td><span style="color:#dc2626;font-weight:700;">${pLevel}</span> ${pAvg.toFixed(1)}</td>
                    <td><span style="color:#2563eb;">${rAvg.toFixed(1)}</span></td>
                    <td style="font-weight:700;color:${gap > 1 ? '#dc2626' : gap > 0.5 ? '#b45309' : '#16a34a'};">${gapVal}</td>
                    <td class="${gapClass}">${gapText}</td>
                    <td>${priority}</td>
                  </tr>`;
                }).join('')}

  <!-- 3.5 구조별 소계 매트릭스 -->
  <div class="card">
    <div class="card-header">
      <span class="ch-icon">\u{1F4CA}</span>
      <h2>\uAD6C\uC870\uBCC4 \uC18C\uACC4 \uBD84\uC11D</h2>
      <span class="ch-tag">\uC601\uC5ED \u00D7 3\uB2E8 \uAD6C\uC870 \uAD50\uCC28 \uBD84\uC11D</span>
    </div>
    <div class="card-body">
      <div class="fw-callout fw-callout-navy">
        <span class="fw-icon">\u{1F4D0}</span>
        <div><strong>\uD574\uC11D \uAC00\uC774\uB4DC:</strong> \uAC01 \uC601\uC5ED\uC744 \uC804\uD658 \uC555\uB825 \u00B7 \uC2E4\uD589 \uAE30\uBC18 \u00B7 \uB3D9\uB825/\uC5ED\uB7C9\uC73C\uB85C \uBD84\uD574\uD558\uC5EC, \u201C\uC555\uB825\uC774 \uB192\uC740\uB370 \uAE30\uBC18\uC774 \uBD80\uC871\uD55C\u201D \uC601\uC5ED\uC744 \uC6B0\uC120 \uAC1C\uC120 \uB300\uC0C1\uC73C\uB85C \uC2DD\uBCC4\uD569\uB2C8\uB2E4. \uC810\uC218\uAC00 \uB192\uC744\uC218\uB85D \uC804\uD658 \uC555\uB825/\uC5ED\uB7C9\uC774 \uB192\uC74C\uC744 \uC758\uBBF8\uD569\uB2C8\uB2E4.</div>
      </div>
      ${(() => {
        /* 그룹 유형 정의 */
        const groupTypes = ['전환 압력', '실행 기반'];
        const thirdGroup = { G: '성장 동력', D: '인재 역량', A: '인재 역량', X: '추진 동력' };
        const groupColors = { '전환 압력': '#ef4444', '실행 기반': '#2563eb', '성장 동력': '#b45309', '인재 역량': '#7c3aed', '추진 동력': '#16a34a' };

        /* 각 영역별 그룹 소계 계산 */
        const matrix = {};
        ['G','D','A','X'].forEach(k => {
          matrix[k] = {};
          const cfg = DOMAIN_CONFIG[k];
          cfg.questions.forEach((q, i) => {
            if (!q.group) return;
            if (!matrix[k][q.group]) matrix[k][q.group] = { sum: 0, cnt: 0 };
            matrix[k][q.group].sum += sc[k][i];
            matrix[k][q.group].cnt++;
          });
        });

        /* 셀 클래스 결정 */
        const cellCls = v => v >= 3.5 ? 'gsm-high' : v >= 2.5 ? 'gsm-mid' : 'gsm-low';

        /* 모든 그룹 유형 수집 (순서 유지) */
        const allGroups = [...groupTypes];
        Object.values(thirdGroup).forEach(g => { if (!allGroups.includes(g)) allGroups.push(g); });

        /* 최대 압력-기반 갭 영역 찾기 */
        let maxGap = 0, gapDomain = '';
        ['G','D','A','X'].forEach(k => {
          const pAvg = matrix[k]['전환 압력'] ? (matrix[k]['전환 압력'].sum / matrix[k]['전환 압력'].cnt) : 0;
          const iAvg = matrix[k]['실행 기반'] ? (matrix[k]['실행 기반'].sum / matrix[k]['실행 기반'].cnt) : 0;
          const gap = pAvg - iAvg;
          if (gap > maxGap) { maxGap = gap; gapDomain = k; }
        });

        /* 역량/동력 부족 영역 찾기 (3번째 그룹 ≤ 2.5) */
        const weakCapDomains = [];
        ['G','D','A','X'].forEach(k => {
          const tg = thirdGroup[k];
          const d3 = matrix[k][tg];
          if (d3 && (d3.sum / d3.cnt) <= 2.5) {
            weakCapDomains.push({ domain: k, group: tg, avg: (d3.sum / d3.cnt).toFixed(1) });
          }
        });

        return `<table class="gsm-table">
          <thead><tr>
            <th></th>
            ${['G','D','A','X'].map(k => `<th style="color:${DOMAIN_CONFIG[k].color}">${DOMAIN_CONFIG[k].icon} ${k} ${DOMAIN_CONFIG[k].name}</th>`).join('')}
          </tr></thead>
          <tbody>
            ${allGroups.map(g => `<tr>
              <th><span class="gsm-row-label"><span class="gsm-dot" style="background:${groupColors[g]}"></span>${g}</span></th>
              ${['G','D','A','X'].map(k => {
                const d = matrix[k][g];
                if (!d) return '<td class="gsm-na">—</td>';
                const avg = (d.sum / d.cnt).toFixed(1);
                return `<td class="${cellCls(d.sum / d.cnt)}">${avg}</td>`;
              }).join('')}
            </tr>`).join('')}
          </tbody>
        </table>
        ${maxGap > 0.5 && gapDomain ? `<div class="gsm-insight">\u26A0\uFE0F <strong>${gapDomain}\uC601\uC5ED(${DOMAIN_CONFIG[gapDomain].name})</strong>\uC758 \uC804\uD658 \uC555\uB825 \uB300\uBE44 \uC2E4\uD589 \uAE30\uBC18 \uAC2D\uCC28\uAC00 \uD06C\uBBC0\uB85C(\u0394${maxGap.toFixed(1)}), \uC6B0\uC120\uC801 \uC778\uD504\uB77C \uAC15\uD654\uAC00 \uD544\uC694\uD569\uB2C8\uB2E4.</div>` : ''}
        ${weakCapDomains.length > 0 ? `<div class="gsm-insight" style="background:#fef2f2;border-color:#fca5a5;color:#991b1b">\u{1F6A8} <strong>\uC5ED\uB7C9/\uB3D9\uB825 \uBD80\uC871 \uC601\uC5ED:</strong> ${weakCapDomains.map(w => `${w.domain}(${DOMAIN_CONFIG[w.domain].name}) ${w.group} ${w.avg}\uC810`).join(', ')} \u2014 \uC778\uC7AC \uC5ED\uB7C9 \uAC1C\uBC1C \uBC0F \uC870\uC9C1 \uC5ED\uB7C9 \uAC15\uD654\uAC00 \uC6B0\uC120 \uACFC\uC81C\uC785\uB2C8\uB2E4.</div>` : ''}`;
      })()}
    </div>
  </div>

              /* 그룹별 평균 사전 계산 */
              const groupAvgs = {};
              cfg.questions.forEach((q, i) => {
                if (!q.group) return;
                if (!groupAvgs[q.group]) groupAvgs[q.group] = { sum: 0, cnt: 0 };
                groupAvgs[q.group].sum += sc[k][i];
                groupAvgs[q.group].cnt++;

                  const gavg = ga ? (ga.sum / ga.cnt).toFixed(1) : '';
                  groupHtml = `<div class="dd-group-label ${groupCss[q.group] || ''}">${q.group}<span class="dd-group-avg">${gavg}</span></div>`;
                }
                return `${groupHtml}<div class="dd-q">
                  <span class="q-code">${q.code}</span>
                  <div class="q-text">${q.label}${revMark}: ${q.text}</div>
                  <div class="btjr-tags">${btags}</div>
                  <div class="q-dots">${dots}</div>
                </div>`;
              }).join('');
            })()}
          </div>
        </div>`;

function generateRecommendations(sc, avgs, tType, btjr) {
  const recs = [];
  const typeCfg = TYPE_CONFIG[tType];

  /* ── 영역별 전환과제 우선순위 자동 스코어링 ── */
  const thirdGrp = { G: '성장 동력', D: '인재 역량', A: '인재 역량', X: '추진 동력' };
  const priorityScores = {};
  ['G','D','A','X'].forEach(k => {
    const cfg = DOMAIN_CONFIG[k];
    /* 그룹별 소계 계산 */
    const gAvg = {};
    cfg.questions.forEach((q, i) => {
      if (!q.group) return;
      if (!gAvg[q.group]) gAvg[q.group] = { s: 0, c: 0 };
      gAvg[q.group].s += sc[k][i]; gAvg[q.group].c++;
    });
    const pAvg = gAvg['전환 압력'] ? gAvg['전환 압력'].s / gAvg['전환 압력'].c : 0;
    const iAvg = gAvg['실행 기반'] ? gAvg['실행 기반'].s / gAvg['실행 기반'].c : 0;
    const tg = thirdGrp[k];
    const cAvg = gAvg[tg] ? gAvg[tg].s / gAvg[tg].c : 0;

    /* 복합 스코어: 압력강도 × max(압력-기반 갭, 0) × (5 - 역량)/4 */
    const pressureGap = Math.max(pAvg - iAvg, 0);
    const capWeakness = (5 - cAvg) / 4;  // 0~1 범위 정규화
    const score = pAvg * (1 + pressureGap * 0.5) * (1 + capWeakness * 0.3);
    priorityScores[k] = { score: score.toFixed(2), pAvg, iAvg, cAvg, pressureGap };
  });

  // 복합 스코어 기준 정렬 (높은 순)
  const sorted = Object.entries(priorityScores).sort((a,b) => parseFloat(b[1].score) - parseFloat(a[1].score));

  sorted.forEach(([k, ps]) => {
    const cfg = DOMAIN_CONFIG[k];
    const avg = avgs[k];
    const readiness = getReadiness(k, sc);
    const gap = readiness > 0 ? avg - readiness : avg;

    if (avg >= 3.5) {
      const recMap = {
        G: { title: '\uCE5C\uD658\uACBD \uC804\uD658 \uC804\uB7B5 \uC218\uB9BD \uC2DC\uAE09', desc: '\uD0C4\uC18C \uADDC\uC81C \uB300\uC751 \uB85C\uB4DC\uB9F5 \uC218\uB9BD, RE100 \uB300\uC751, \uD0C4\uC18C\uBC1C\uC790\uAD6D \uC0B0\uC815 \uCCB4\uACC4 \uAD6C\uCD95\uC744 \uAD8C\uACE0\uD569\uB2C8\uB2E4.' },
        D: { title: '\uB514\uC9C0\uD138 \uC778\uD504\uB77C \uACE0\uB3C4\uD654 \uD544\uC694', desc: '\uC2A4\uB9C8\uD2B8\uACF5\uC7A5 \uB3C4\uC785, ERP/MES \uC5C5\uADF8\uB808\uC774\uB4DC, \uB370\uC774\uD130 \uAE30\uBC18 \uC758\uC0AC\uACB0\uC815 \uCCB4\uACC4 \uAD6C\uCD95\uC774 \uC2DC\uAE09\uD569\uB2C8\uB2E4.' },
        A: { title: 'AI \uB3C4\uC785 \uB85C\uB4DC\uB9F5 \uC218\uB9BD \uAD8C\uACE0', desc: 'AI \uD65C\uC6A9 \uAC00\uB2A5 \uC601\uC5ED \uBC1C\uAD74 \uBC0F \uB2E8\uACC4\uC801 \uB3C4\uC785(\uD488\uC9C8\uAC80\uC0AC\u2192\uC608\uC9C0\uBCF4\uC804\u2192\uACF5\uC815\uCD5C\uC801\uD654)\uC744 \uC81C\uC548\uD569\uB2C8\uB2E4.' },
        X: { title: '\uACE0\uC6A9\uAD6C\uC870 \uC804\uD658 \uB300\uC751 \uCCB4\uACC4 \uAD6C\uCD95', desc: '\uC9C1\uBB34 \uC7AC\uC124\uACC4 \uBC0F \uC778\uB825 \uC7AC\uBC30\uCE58 \uACC4\uD68D\uC774 \uC2DC\uAE09\uD569\uB2C8\uB2E4. \uB178\uC0AC \uACF5\uB3D9 \uC804\uD658\uC704\uC6D0\uD68C \uAD6C\uC131\uC744 \uAD8C\uACE0\uD569\uB2C8\uB2E4.' }
      };
      const r = recMap[k];
      recs.push({ domain: k, title: r.title, desc: r.desc, color: cfg.color, priority: 1, score: ps.score, tags: [k, ...DOMAIN_CONFIG[k].questions[0].btjr] });
    } else if (avg >= 2.5 && gap > 1.0) {
      recs.push({ domain: k, title: `${cfg.name} \uC601\uC5ED Gap \uD574\uC18C \uD544\uC694`, desc: `\uC804\uD658\uC555\uB825 \uB300\uBE44 \uB0B4\uBD80 \uC900\uBE44\uB3C4 \uACA9\uCC28\uAC00 \uD06C\uBBC0\uB85C \uC6B0\uC120 \uB300\uC751\uC774 \uD544\uC694\uD569\uB2C8\uB2E4.`, color: cfg.color, priority: 2, score: ps.score, tags: [k] });
    }
  });

  // BTJR pathway recommendation
  if (parseFloat(btjr.B) >= 3.0) {
    recs.push({ domain: 'BTJR', title: 'BTJR \uC804\uD658 \uC5F0\uC1C4 \uC601\uD5A5 \uBD84\uC11D \uD544\uC694',
      desc: `\uC0AC\uC5C5\uAD6C\uC870(${btjr.B}) \uC804\uD658 \uC555\uB825\uC774 \uB192\uC544 \uAE30\uC220\uC6B4\uC601(${btjr.T})\u2192\uC9C1\uBB34\uC5ED\uB7C9(${btjr.J})\u2192\uB178\uC0AC\uAD00\uACC4(${btjr.R})\uB85C \uC5F0\uC1C4\uC801 \uC601\uD5A5\uC774 \uC608\uC0C1\uB429\uB2C8\uB2E4. \uD1B5\uD569 \uC804\uD658 \uC804\uB7B5\uC774 \uD544\uC694\uD569\uB2C8\uB2E4.`,
      color: '#1e3a5f', priority: 1, tags: ['B','T','J','R'] });
  }

  // 전환 유형 기반 추천
  recs.push({ domain: typeCfg.name, title: `${typeCfg.name} \uB9DE\uCDA4 \uCEE8\uC124\uD305 \uD504\uB85C\uADF8\uB7A8`,
    desc: `${typeCfg.desc}. \uC815\uBC00 \uC9C4\uB2E8(G-DAX 3\uB2E8 \uAD6C\uC870 \uBD84\uC11D)\uC744 \uD1B5\uD574 \uAE30\uC5C5 \uB9DE\uCDA4 \uC804\uD658\uACFC\uC81C\uB97C \uC124\uACC4\uD569\uB2C8\uB2E4.`,
    color: '#1e3a5f', priority: 3, tags: ['\uC804\uD658\uC720\uD615'] });

  recs.sort((a,b) => a.priority - b.priority);

  const container = document.getElementById('recommendations');
  if (!container) return;
  container.innerHTML = recs.map((r, i) => `
    <div class="rec-item">
      <div class="rec-num" style="background:${r.color}">${i + 1}</div>
      <div class="rec-content">
        <div class="rec-title">${r.title}${r.score ? ` <span style="font-size:10px;color:#6b7280;font-weight:500;margin-left:6px">\uC6B0\uC120\uC810\uC218 ${r.score}</span>` : ''}</div>
        <div class="rec-desc">${r.desc}</div>
        <div class="rec-tags">
          ${(r.tags || []).map(t => {
            const tagColors = { G: 'background:#dcfce7;color:#166534', D: 'background:#dbeafe;color:#1e40af',
              A: 'background:#ede9fe;color:#5b21b6', X: 'background:#fee2e2;color:#991b1b',
              B: 'background:#dbeafe;color:#1e40af', T: 'background:#dcfce7;color:#166534',
              J: 'background:#fef3c7;color:#92400e', R: 'background:#fee2e2;color:#991b1b' };
            const style = tagColors[t] || 'background:#f3f4f6;color:#374151';
            return `<span class="rtag" style="${style}">${t}</span>`;
          }).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

// Initialize
render().then(() => {
  // autopdf 파라미터 처리
  const params = new URLSearchParams(window.location.search);
  if (params.get('autopdf') === '1') {
    setTimeout(() => downloadPDF(), 1000);
  }
});

/* ── PDF 다운로드 (window.print 방식) ── */
function downloadPDF() {
  const btn = document.getElementById('pdfBtn');
  btn.disabled = true;
  btn.textContent = '⏳ PDF 준비 중...';

  // 1) 페이지 제목을 파일명으로 설정 (브라우저가 PDF 저장 시 이 이름 사용)
  const companyName = document.querySelector('.company-name')?.textContent || 'GDAX진단';
  const today = new Date().toISOString().slice(0, 10);
  const originalTitle = document.title;
  document.title = `GDAX_준비도진단_결과_${companyName}_${today}`;

  // 2) Canvas 차트를 이미지로 변환 (인쇄 시 canvas는 빈 상태로 출력되므로)
  const canvases = document.querySelectorAll('canvas');
  const originals = [];
  canvases.forEach(canvas => {
    try {
      const img = document.createElement('img');
      img.src = canvas.toDataURL('image/png');
      img.className = 'chart-img';
      img.style.cssText = canvas.style.cssText || '';
      img.style.maxWidth = '100%';
      img.style.height = 'auto';
      originals.push({ canvas, parent: canvas.parentNode, next: canvas.nextSibling });
      canvas.parentNode.insertBefore(img, canvas);
      canvas.style.display = 'none';
    } catch(e) { /* CORS 등 오류 시 원본 canvas 유지 */ }
  });

  // 3) 인쇄 실행
  setTimeout(() => {
    window.print();

    // 4) 인쇄 후 복원
    originals.forEach(({ canvas }) => {
      canvas.style.display = '';
      const img = canvas.parentNode.querySelector('img.chart-img');
      if (img) img.remove();
    });
    document.title = originalTitle;
    btn.disabled = false;
    btn.textContent = '📥 PDF 다운로드 (A4)';
  }, 300);
}
</script>
